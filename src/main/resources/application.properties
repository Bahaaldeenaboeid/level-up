# ============================================
# POSTGRESQL DATABASE CONFIGURATION
# ============================================

spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_store
spring.datasource.username=store_user
spring.datasource.password=123123123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=uploads/

# ============================================
# IMAGE STORAGE PATHS
# ============================================

app.upload.dir=uploads/
app.upload.products.dir=uploads/products/
app.upload.reviews.dir=uploads/reviews/

# ============================================
# JWT CONFIGURATION
# ============================================

# ? UPDATED: Your 256-bit secure secret key
jwt.secret=this is a secure 256-bit secret key for jwt signing
jwt.expiration=86400000

# ============================================
# EMAIL CONFIGURATION
# ============================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=elitereserveguide@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ? Required for JavaMailSender
spring.mail.default-encoding=UTF-8
spring.mail.protocol=smtp
spring.mail.test-connection=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================
# SERVER
# ============================================

server.port=8080